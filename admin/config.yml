backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

display_url: "Latte Lounge Content Manager"
logo_url: "/admin/logo.jpeg"

collections:
  - name: "landing_page"
    label: " Landing Page"
    label_singular: "Landing Page Content"
    delete: false
    files:
      - name: "landing"
        label: "Landing Page Content"
        file: "_content/landing.json"
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Main Image", name: "image", widget: "image" }
          - { label: "Main Description", name: "description", widget: "markdown" }
          - label: "Offers"
            name: "offers"
            widget: "list"
            fields:
              - { label: "Title", name: "offer_title", widget: "string" }
              - { label: "Description", name: "offer_desc", widget: "string" }
              - { label: "Icon", name: "offer_icon", widget: "string", description: "e.g. coffee, gift" }
          - label: "Announcements"
            name: "announcements"
            widget: "list"
            fields:
              - { label: "Message", name: "message", widget: "string" }
              - { label: "Link (Optional)", name: "link", widget: "string" }
              - { label: "Date (Optional)", name: "date", widget: "date", required: false }

  - name: "menu"
    label: " Cafe Menu"
    label_singular: "Menu Item"
    folder: "_content/menu"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Item Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Cake", "Coffee", "Snack"] }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Featured Item?", name: "featured", widget: "boolean", default: false }

  - name: "settings"
    label: " Site Settings"
    label_singular: "Global Settings"
    delete: false
    files:
      - name: "general"
        label: "Global Settings"
        file: "_content/settings.json"
        fields:
          - { label: "Site Name", name: "site_title", widget: "string", default: "Latte Lounge" }
          - { label: "Header Style", name: "header_style", widget: "select", options: ["Light", "Dark", "Custom"] }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Social Links", name: "social_links", widget: "object", fields: [
              { label: "Facebook", name: "facebook", widget: "string" },
              { label: "Instagram", name: "instagram", widget: "string" }
            ]
          }