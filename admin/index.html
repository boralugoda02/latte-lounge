<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latte Lounge Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      body {
        background-color: #FAFAFA !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
      }
      #nc-root header, 
      nav[class*="AppHeader"] {
        background-color: #FFFFFF !important;
        border-bottom: 1px solid #EAEAEA !important;
        height: 70px !important;
        box-shadow: 0 1px 4px rgba(0,0,0,0.02) !important;
      }
      nav[class*="AppHeader"]::before {
        content: "Latte Lounge";
        color: #111111 !important;
        font-weight: 700;
        font-size: 1.3rem;
        letter-spacing: -0.5px;
        padding-left: 24px;
        display: flex;
        align-items: center;
        height: 100%;
      }
      nav[class*="AppHeader"] a, 
      nav[class*="AppHeader"] div[class*="Logo"] {
        display: none !important;
      }
      aside[class*="Sidebar"], 
      div[class*="SidebarContainer"] {
        background-color: #FFFFFF !important;
        border-right: 1px solid #EAEAEA !important;
        box-shadow: none !important;
      }
      aside[class*="Sidebar"] h2 {
        color: #D9658B !important;
        font-weight: 600 !important;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
        padding-left: 20px !important;
        margin-top: 20px !important;
      }
      aside[class*="Sidebar"] a {
        color: #555555 !important;
        border-radius: 6px !important;
        margin: 4px 12px !important;
        padding: 10px 16px !important;
        transition: all 0.2s ease !important;
        font-size: 0.9rem !important;
        font-weight: 500 !important;
      }
      aside[class*="Sidebar"] a:hover {
        background-color: #F5F5F7 !important;
        color: #111111 !important;
      }
      aside[class*="Sidebar"] a[class*="active"],
      aside[class*="Sidebar"] a:active {
        background-color: #E8D3D8 !important;
        color: #D9658B !important;
        font-weight: 600 !important;
      }
      button[class*="Button"], 
      a[class*="Button"],
      div[class*="QuickAdd"] button,
      button[class*="StyledDropdownButton"] {
        background-color: #D9658B !important;
        color: #FFFFFF !important;
        border: none !important;
        border-radius: 20px !important;
        font-weight: 600 !important;
        padding: 8px 20px !important;
        font-size: 0.85rem !important;
        transition: all 0.2s ease !important;
        box-shadow: 0 2px 6px rgba(217, 101, 139, 0.2) !important;
      }
      button[class*="Button"]:hover,
      div[class*="QuickAdd"] button:hover,
      button[class*="StyledDropdownButton"]:hover {
        background-color: #C25476 !important;
        color: #FFFFFF !important;
        box-shadow: 0 4px 12px rgba(217, 101, 139, 0.3) !important;
      }
      div[class*="CollectionTop"] {
        background: #FFFFFF !important;
        border-radius: 12px !important;
        padding: 24px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.02) !important;
        border: 1px solid #EAEAEA !important;
      }
      div[class*="CollectionTop"] h1 {
        color: #111111 !important;
        font-weight: 700 !important;
        font-size: 1.6rem !important;
        letter-spacing: -0.5px;
      }
      div[class*="Top"] div[class*="Container"] {
        background-color: #FFFFFF !important;
        border: 1px solid #EAEAEA !important;
        border-radius: 8px !important;
        color: #111111 !important;
      }
      input[class*="SearchInput"] {
        background-color: #F5F5F7 !important;
        border: 1px solid #EAEAEA !important;
        border-radius: 6px !important;
        color: #111111 !important;
      }
      #netlify-identity-widget {
        font-family: sans-serif;
      }
      .nc-netlifyIdentityWidget-button {
        background-color: #D9658B !important;
        color: #FFFFFF !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
