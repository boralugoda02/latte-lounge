<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a Hill Country Cardamom Latte in a ceramic cup">
  <rect width="400" height="300" fill="#5C7860"/>
  <rect width="400" height="300" fill="#000000" fill-opacity="0.12"/>

  <!-- saucer -->
  <ellipse cx="200" cy="230" rx="110" ry="16" fill="#FBF8F6"/>
  <ellipse cx="200" cy="230" rx="110" ry="16" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- cup body -->
  <path d="M110 130 Q110 220 130 224 H270 Q290 220 290 130 Z" fill="#FBF8F6" stroke="#000000" stroke-width="2.5"/>
  <!-- handle -->
  <path d="M290 150 Q325 150 325 178 Q325 206 290 200" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"/>

  <!-- coffee surface -->
  <ellipse cx="200" cy="130" rx="90" ry="18" fill="#3A2418"/>
  <ellipse cx="200" cy="130" rx="90" ry="18" fill="none" stroke="#000000" stroke-width="2.5"/>

  <!-- latte art heart -->
  <path d="M200 118 C190 105 168 108 168 124 C168 140 200 150 200 150 C200 150 232 140 232 124 C232 108 210 105 200 118 Z"
        fill="#E9D2B4" opacity="0.95"/>

  <!-- steam -->
  <path d="M170 95 Q162 80 172 66 Q182 52 174 38" fill="none" stroke="#FBF8F6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M200 90 Q192 75 202 61 Q212 47 204 33" fill="none" stroke="#FBF8F6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 95 Q222 80 232 66 Q242 52 234 38" fill="none" stroke="#FBF8F6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- cardamom pods scattered -->
  <g fill="#3A503C" stroke="#000000" stroke-width="1.5">
    <ellipse cx="80" cy="245" rx="9" ry="6" transform="rotate(-20 80 245)"/>
    <ellipse cx="320" cy="248" rx="9" ry="6" transform="rotate(15 320 248)"/>
    <ellipse cx="340" cy="230" rx="9" ry="6" transform="rotate(-30 340 230)"/>
  </g>
</svg>
