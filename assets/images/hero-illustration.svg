<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a cozy hill-country coffee lounge interior with mountains through the window">
  <rect width="400" height="300" fill="#3A503C"/>

  <!-- distant hills -->
  <path d="M0 190 Q60 150 120 185 T240 175 T400 190 V300 H0 Z" fill="#2E4030"/>
  <path d="M0 210 Q80 175 160 205 T320 200 T400 215 V300 H0 Z" fill="#26362A"/>

  <!-- window frame -->
  <rect x="60" y="40" width="280" height="150" rx="4" fill="#FBF8F6" fill-opacity="0.06" stroke="#FBF8F6" stroke-width="2"/>
  <line x1="200" y1="40" x2="200" y2="190" stroke="#FBF8F6" stroke-width="2"/>
  <line x1="60" y1="115" x2="340" y2="115" stroke="#FBF8F6" stroke-width="2"/>

  <!-- sun -->
  <circle cx="290" cy="80" r="18" fill="#E05D8E" fill-opacity="0.85"/>

  <!-- table -->
  <rect x="30" y="230" width="340" height="8" rx="2" fill="#FBF8F6" fill-opacity="0.9"/>
  <rect x="45" y="238" width="8" height="30" fill="#FBF8F6" fill-opacity="0.7"/>
  <rect x="347" y="238" width="8" height="30" fill="#FBF8F6" fill-opacity="0.7"/>

  <!-- coffee cup -->
  <g transform="translate(150,190)">
    <path d="M0 30 Q0 45 20 45 H50 Q70 45 70 30 V10 H0 Z" fill="#FBF8F6"/>
    <ellipse cx="35" cy="10" rx="35" ry="7" fill="#FBF8F6"/>
    <ellipse cx="35" cy="10" rx="35" ry="7" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M0 30 Q0 45 20 45 H50 Q70 45 70 30" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M70 16 Q86 16 86 27 Q86 38 70 34" fill="none" stroke="#FBF8F6" stroke-width="4"/>
    <!-- steam -->
    <path d="M20 4 Q14 -8 22 -18 Q30 -28 24 -38" fill="none" stroke="#FBF8F6" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M42 4 Q36 -8 44 -18 Q52 -28 46 -38" fill="none" stroke="#FBF8F6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- plate with pastry -->
  <g transform="translate(255,210)">
    <ellipse cx="30" cy="26" rx="34" ry="9" fill="#FBF8F6"/>
    <ellipse cx="30" cy="26" rx="34" ry="9" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M8 20 Q30 4 52 20 L52 22 Q30 8 8 22 Z" fill="#E05D8E"/>
  </g>
</svg>
