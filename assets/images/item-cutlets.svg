<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a plate of golden-fried spiced fish cutlets with garnish">
  <rect width="400" height="300" fill="#3A503C"/>
  <rect width="400" height="300" fill="#000000" fill-opacity="0.1"/>

  <!-- plate -->
  <ellipse cx="200" cy="200" rx="140" ry="34" fill="#FBF8F6"/>
  <ellipse cx="200" cy="200" rx="140" ry="34" fill="none" stroke="#000000" stroke-width="2"/>
  <ellipse cx="200" cy="196" rx="100" ry="22" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.5"/>

  <!-- cutlets: golden ovals with speckled texture -->
  <g stroke="#000000" stroke-width="2">
    <ellipse cx="150" cy="170" rx="38" ry="26" fill="#D89A4A"/>
    <ellipse cx="230" cy="160" rx="38" ry="26" fill="#CB8A3B" transform="rotate(-8 230 160)"/>
    <ellipse cx="195" cy="200" rx="38" ry="26" fill="#D89A4A" transform="rotate(6 195 200)"/>
  </g>
  <!-- speckle texture -->
  <g fill="#7A4A1E" opacity="0.6">
    <circle cx="140" cy="165" r="2"/><circle cx="158" cy="178" r="1.6"/><circle cx="150" cy="158" r="1.8"/>
    <circle cx="220" cy="155" r="2"/><circle cx="240" cy="168" r="1.6"/><circle cx="234" cy="150" r="1.8"/>
    <circle cx="188" cy="196" r="2"/><circle cx="204" cy="208" r="1.6"/><circle cx="198" cy="190" r="1.8"/>
  </g>

  <!-- lime wedge -->
  <g transform="translate(305,190)">
    <path d="M0 0 A22 22 0 0 1 22 22 L0 22 Z" fill="#E9D2B4" stroke="#000000" stroke-width="1.5"/>
    <path d="M0 4 A16 16 0 0 1 16 20" fill="none" stroke="#3A503C" stroke-width="1.5"/>
  </g>

  <!-- garnish leaves -->
  <g fill="#5C7860" stroke="#000000" stroke-width="1.2">
    <ellipse cx="95" cy="188" rx="10" ry="5" transform="rotate(30 95 188)"/>
    <ellipse cx="88" cy="200" rx="10" ry="5" transform="rotate(60 88 200)"/>
  </g>
</svg>
