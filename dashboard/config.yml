backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

display_url: "Latte Lounge Content Manager"
logo_url: "/dashboard/logo.png"

collections:
  - name: "landing_page"
    label: "Landing Page"
    label_singular: "Landing Page Content"
    files:
      - file: "content/landing.json"
        label: "Main Content"
        name: "main_content"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }